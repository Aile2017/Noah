name: Build (MSVC)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC x64 environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build
        run: nmake

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Move-Item Release\Noah.exe dist\Noah_vcc.exe

      - uses: actions/upload-artifact@v4
        with:
          name: Noah_vcc
          path: dist\Noah_vcc.exe

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: build-vcc-${{ github.run_number }}
          name: "[MSVC] Build ${{ github.run_number }} (${{ github.ref_name }})"
          body: |
            Built from commit ${{ github.sha }} (`${{ github.ref_name }}`)
          files: dist\Noah_vcc.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
